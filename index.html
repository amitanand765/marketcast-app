<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#060e1c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MarketCast"/>
<title>MarketCast</title>
<link rel="manifest" href="/marketcast-app/manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<link rel="apple-touch-icon" href="/marketcast-app/icon.svg"/>
<meta name="mobile-web-app-capable" content="yes"/>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#060e1c;color:#f0f8ff;font-family:'Segoe UI',system-ui,sans-serif;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:0;height:0}

  /* HEADER */
  .header{background:#060e1c;border-bottom:1px solid #1b3354;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header-title{font-size:18px;font-weight:700}
  .header-right{display:flex;gap:12px;align-items:center}
  .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4db6ff,#00c9a7);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0c1e35;border-top:1px solid #1b3354;display:flex;z-index:100}
  .nav-btn{flex:1;background:none;border:none;padding:10px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:#3d6080}
  .nav-btn.active{color:#4db6ff}
  .nav-btn span:first-child{font-size:19px}
  .nav-btn span:last-child{font-size:9px;font-weight:400}
  .nav-btn.active span:last-child{font-weight:600}
  .nav-dot{width:16px;height:2px;background:#4db6ff;border-radius:2px;margin-top:2px}

  /* CONTENT */
  .content{padding-bottom:68px;min-height:calc(100vh - 60px)}

  /* CARDS */
  .card{background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:14px}
  .card-elevated{background:#132840;border:1px solid #1b3354;border-radius:12px;padding:14px}

  /* MARKET STATUS */
  .market-status{padding:7px 16px;display:flex;align-items:center;gap:8px;font-size:12px}
  .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

  /* INDEX SCROLL */
  .index-scroll{padding:14px 16px 0;overflow-x:auto}
  .index-row{display:flex;gap:10px;min-width:max-content;padding-bottom:4px}
  .index-card{background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:12px 16px;min-width:155px}

  /* STOCK ROW */
  .stock-row{background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
  .stock-icon{width:40px;height:40px;border-radius:10px;background:#132840;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#4db6ff}
  .stock-name{font-size:13px;font-weight:600;color:#f0f8ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stock-sector{font-size:11px;color:#3d6080}

  /* COLORS */
  .green{color:#00c9a7}.red{color:#ef5350}.blue{color:#4db6ff}.yellow{color:#ffd166}.muted{color:#3d6080}.sub{color:#7aa8cc}

  /* BADGES */
  .badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
  .badge-pos{background:#00c9a722;color:#00c9a7}
  .badge-neg{background:#ef535022;color:#ef5350}
  .badge-neu{background:#4db6ff22;color:#4db6ff}

  /* TABS */
  .tabs{display:flex;border-bottom:1px solid #1b3354;padding:0 16px;background:#060e1c;position:sticky;top:57px;z-index:50}
  .tab-btn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:#3d6080;padding:10px 0;font-size:12px;font-weight:400;cursor:pointer;font-family:inherit}
  .tab-btn.active{color:#4db6ff;border-bottom-color:#4db6ff;font-weight:600}

  /* SEARCH */
  .search-box{background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .search-input{background:none;border:none;outline:none;color:#f0f8ff;font-size:14px;flex:1;font-family:inherit}

  /* INFO ROW */
  .info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1b335415}

  /* SPINNER */
  .spinner{width:32px;height:32px;border:3px solid #1b3354;border-top-color:#4db6ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* CHART CONTAINER */
  .chart-wrap{position:relative;width:100%;margin:8px 0}

  /* BACK BTN */
  .back-btn{background:none;border:none;color:#7aa8cc;cursor:pointer;font-size:22px;padding:0;line-height:1}

  /* RECOMMENDATION */
  .rec-card{border-radius:14px;padding:16px;margin-bottom:12px}
  .rec-prices{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
  .rec-price-box{background:#132840;border-radius:10px;padding:10px 8px;text-align:center}

  /* NEWS */
  .news-card{background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:14px;margin-bottom:10px}
  .news-tags{display:flex;gap:8px;flex-wrap:wrap;overflow-x:auto;padding-bottom:12px}
  .news-tag{background:#0c1e35;border:1px solid #1b3354;color:#3d6080;padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit}
  .news-tag.active{background:#4db6ff22;border-color:#4db6ff;color:#4db6ff;font-weight:600}

  /* PICKER */
  .picker-btn{width:100%;background:#0c1e35;border:1px solid #1b3354;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:inherit}
  .picker-dropdown{margin-top:8px;background:#132840;border:1px solid #1b3354;border-radius:12px;overflow:hidden;box-shadow:0 8px 32px #00000066}
  .picker-list{max-height:320px;overflow-y:auto}
  .picker-item{width:100%;background:none;border:none;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:1px solid #1b335415;font-family:inherit}
  .picker-section{padding:6px 14px;font-size:9px;color:#3d6080;letter-spacing:1px;background:#060e1c;border-bottom:1px solid #1b3354}

  /* WATCHLIST STAR */
  .star-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:0 0 0 4px;flex-shrink:0}

  /* GLOBAL */
  .section{padding:14px 16px}
  .section-title{font-size:11px;color:#7aa8cc;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase}
  .flex-row{display:flex;gap:8px;overflow-x:auto}
  .global-card{background:#0c1e35;border:1px solid #1b3354;border-radius:10px;padding:10px 14px;flex-shrink:0}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-title" id="page-title">MarketCast</div>
    <div class="header-right">
      <span style="font-size:18px;color:#3d6080;cursor:pointer">🔔</span>
      <div class="avatar">U</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="navigate('home')" id="nav-home">
      <span>⌂</span><span>Home</span><div class="nav-dot"></div>
    </button>
    <button class="nav-btn" onclick="navigate('search')" id="nav-search">
      <span>⊕</span><span>Search</span>
    </button>
    <button class="nav-btn" onclick="navigate('fo')" id="nav-fo">
      <span>◈</span><span>F&amp;O</span>
    </button>
    <button class="nav-btn" onclick="navigate('news')" id="nav-news">
      <span>◉</span><span>News</span>
    </button>
    <button class="nav-btn" onclick="navigate('watchlist')" id="nav-watchlist">
      <span>★</span><span>Watch</span>
    </button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const API = 'https://marketcast-backend-production.up.railway.app';

// ── STATE ───────────────────────────────────────────────────────────────────
let currentTab    = 'home';
let selectedStock = null;
let watchlist     = JSON.parse(localStorage.getItem('watchlist') || '["RELIANCE","TCS","INFY"]');
let marketData    = {};
let stockCache    = {};
let newsCache     = [];
let foInstrument  = {label:'NIFTY',name:'Nifty 50',price:22587,atm:22600,lot:50,type:'index'};

// ── INSTRUMENTS ─────────────────────────────────────────────────────────────
const FO_INSTRUMENTS = [

  {label:'BANKNIFTY',name:'Bank Nifty',price:48234,atm:48200,lot:15,type:'index'},

  {label:'HCLTECH',name:'HCL Technologies',price:1456,atm:1450,lot:350,type:'stock'},
  {label:'TECHM',name:'Tech Mahindra',price:1289,atm:1300,lot:500,type:'stock'},
  {label:'DRREDDY',name:'Dr Reddys Laboratories',price:5678,atm:5700,lot:125,type:'stock'},
  {label:'CIPLA',name:'Cipla',price:1234,atm:1250,lot:650,type:'stock'},
  {label:'ADANIPORTS',name:'Adani Ports & SEZ',price:1234,atm:1250,lot:400,type:'stock'},
  {label:'ADANIENT',name:'Adani Enterprises',price:2987,atm:3000,lot:250,type:'stock'},
  {label:'ZOMATO',name:'Zomato',price:178,atm:180,lot:4500,type:'stock'},
  {label:'HAL',name:'Hindustan Aeronautics',price:3456,atm:3450,lot:150,type:'stock'},
  {label:'BEL',name:'Bharat Electronics',price:234,atm:235,lot:4500,type:'stock'},

const STOCKS = [
  {name:'Reliance Industries',symbol:'RELIANCE',sector:'Energy',mcap:'19.2L Cr'},
  {name:'TCS',symbol:'TCS',sector:'IT',mcap:'14.1L Cr'},
  {name:'HDFC Bank',symbol:'HDFCBANK',sector:'Banking',mcap:'12.4L Cr'},
  {name:'Infosys',symbol:'INFY',sector:'IT',mcap:'6.1L Cr'},
  {name:'ICICI Bank',symbol:'ICICIBANK',sector:'Banking',mcap:'7.6L Cr'},
  {name:'Bharti Airtel',symbol:'BHARTIARTL',sector:'Telecom',mcap:'7.2L Cr'},
  {name:'SBI',symbol:'SBIN',sector:'Banking',mcap:'6.5L Cr'},
  {name:'Kotak Mahindra Bank',symbol:'KOTAKBANK',sector:'Banking',mcap:'3.5L Cr'},
  {name:'Wipro',symbol:'WIPRO',sector:'IT',mcap:'2.4L Cr'},
  {name:'L&T',symbol:'LT',sector:'Infra',mcap:'4.7L Cr'},
  {name:'HUL',symbol:'HINDUNILVR',sector:'FMCG',mcap:'5.7L Cr'},
  {name:'Sun Pharma',symbol:'SUNPHARMA',sector:'Pharma',mcap:'3.7L Cr'},
  {name:'Asian Paints',symbol:'ASIANPAINT',sector:'FMCG',mcap:'2.7L Cr'},
  {name:'Maruti Suzuki',symbol:'MARUTI',sector:'Auto',mcap:'3.9L Cr'},
  {name:'Bajaj Finance',symbol:'BAJFINANCE',sector:'NBFC',mcap:'4.3L Cr'},
  {name:'Titan',symbol:'TITAN',sector:'Consumer',mcap:'3.0L Cr'},
  {name:'ONGC',symbol:'ONGC',sector:'Energy',mcap:'2.9L Cr'},
  {name:'Power Grid',symbol:'POWERGRID',sector:'Utilities',mcap:'2.7L Cr'},
  {name:'Adani Ports',symbol:'ADANIPORTS',sector:'Infra',mcap:'2.6L Cr'},
  {name:'Nestle India',symbol:'NESTLEIND',sector:'FMCG',mcap:'2.2L Cr'},
];

// ── HELPERS ─────────────────────────────────────────────────────────────────
const fmt  = (n) => Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = (n) => Number(n).toLocaleString('en-IN');
const chgColor = (v) => v >= 0 ? '#00c9a7' : '#ef5350';
const chgArrow = (v) => v >= 0 ? '▲' : '▼';
const chgHtml  = (v,p,size=12) => `<span style="color:${chgColor(v)};font-size:${size}px;font-weight:500">${chgArrow(v)} ${Math.abs(v).toFixed(2)} (${Math.abs(p).toFixed(2)}%)</span>`;

async function apiFetch(path) {
  try {
    const r = await fetch(API + path);
    return await r.json();
  } catch(e) {
    return {error: e.message};
  }
}

function saveWatchlist() {
  localStorage.setItem('watchlist', JSON.stringify(watchlist));
}

function toggleWatchlist(sym) {
  if (watchlist.includes(sym)) {
    watchlist = watchlist.filter(s => s !== sym);
  } else {
    watchlist.push(sym);
  }
  saveWatchlist();
}

function spinner() {
  return `<div class="spinner"></div>`;
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────
function navigate(tab, stock=null) {
  currentTab = tab;
  selectedStock = stock;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('active');
    b.innerHTML = b.innerHTML.replace('<div class="nav-dot"></div>','');
  });
  const nb = document.getElementById('nav-'+tab);
  if (nb) {
    nb.classList.add('active');
    if (!nb.querySelector('.nav-dot')) nb.insertAdjacentHTML('beforeend','<div class="nav-dot"></div>');
  }
  const titles = {home:'MarketCast',search:'Stocks',fo:'F&O',news:'News',watchlist:'Watchlist'};
  document.getElementById('page-title').textContent = (tab==='search' && stock) ? '' : titles[tab];
  renderPage();
}

function renderPage() {
  const c = document.getElementById('content');
  c.innerHTML = spinner();
  if (currentTab==='home')      renderHome();
  else if (currentTab==='search' && !selectedStock) renderSearch();
  else if (currentTab==='search' && selectedStock)  renderStockDetail();
  else if (currentTab==='fo')       renderFO();
  else if (currentTab==='news')     renderNews();
  else if (currentTab==='watchlist')renderWatchlist();
}

// ── HOME ─────────────────────────────────────────────────────────────────────
async function renderHome() {
  const c = document.getElementById('content');
  const now = new Date();
  const h = now.getHours();
  const open = h >= 9 && h < 16;
  const dotColor = open ? '#00c9a7' : '#ef5350';
  const statusText = open ? 'Market Open' : 'Market Closed';

  let html = `
    <div class="market-status" style="background:${dotColor}12;border-bottom:1px solid ${dotColor}33">
      <span class="status-dot" style="background:${dotColor};box-shadow:0 0 6px ${dotColor}"></span>
      <span style="color:${dotColor};font-weight:600">${statusText}</span>
      <span class="muted" style="margin-left:auto;font-size:11px">NSE • ${now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span>
    </div>`;

  c.innerHTML = html + spinner();

  // Fetch market data
  const market = await apiFetch('/market');

  const indices = [
    {name:'NIFTY 50',   key:'NIFTY'},
    {name:'SENSEX',     key:'SENSEX'},
    {name:'BANK NIFTY', key:'BANKNIFTY'},
    {name:'NIFTY IT',   key:'NIFTYIT'},
  ];

  let idxHtml = `<div class="index-scroll"><div class="index-row">`;
  for (const idx of indices) {
    const d = market[idx.key] || {price:0,change:0,pct:0};
    idxHtml += `
      <div class="index-card">
        <div style="font-size:10px;color:#7aa8cc;margin-bottom:4px">${idx.name}</div>
        <div style="font-size:20px;font-weight:700">${fmtN(d.price)}</div>
        ${chgHtml(d.change,d.pct,11)}
      </div>`;
  }
  idxHtml += `</div></div>`;

  // Global markets
  const globals = [
    {n:'Dow Jones',p:fmtN(market.DOW?.price||39127),c:market.DOW?.pct||0.43},
    {n:'Nasdaq',   p:fmtN(market.NASDAQ?.price||18003),c:market.NASDAQ?.pct||0.67},
    {n:'SGX Nifty',p:'22,590',c:0.21},
    {n:'Hang Seng',p:'18,456',c:-0.34},
  ];
  let globalHtml = `<div class="section"><div class="section-title">🌍 Global Markets</div><div class="flex-row">`;
  for (const g of globals) {
    globalHtml += `
      <div class="global-card">
        <div style="font-size:9px;color:#3d6080;margin-bottom:3px">${g.n}</div>
        <div style="font-size:14px;font-weight:600">${g.p}</div>
        <div style="font-size:10px;color:${chgColor(g.c)}">${g.c>=0?'+':''}${g.c}%</div>
      </div>`;
  }
  globalHtml += `</div></div>`;

  // Top stocks
  let stocksHtml = `<div class="section"><div class="section-title">🚀 NSE Stocks</div>`;
  for (const s of STOCKS.slice(0,8)) {
    const inW = watchlist.includes(s.symbol);
    stocksHtml += `
      <div class="stock-row" onclick="navigate('search',${JSON.stringify(s)})">
        <div class="stock-icon">${s.symbol.slice(0,3)}</div>
        <div style="flex:1;min-width:0">
          <div class="stock-name">${s.name}</div>
          <div class="stock-sector">${s.sector}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:700">Loading...</div>
          <div style="font-size:11px;color:#3d6080">—</div>
        </div>
        <button class="star-btn" style="color:${inW?'#ffd166':'#3d6080'}" onclick="event.stopPropagation();toggleWatchlist('${s.symbol}');renderHome()">${inW?'★':'☆'}</button>
      </div>`;
  }
  stocksHtml += `</div>`;

  c.innerHTML = html + idxHtml + globalHtml + stocksHtml;
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
function renderSearch() {
  const c = document.getElementById('content');
  let html = `
    <div style="padding:16px">
      <div class="search-box">
        <span style="color:#3d6080;font-size:16px">🔍</span>
        <input class="search-input" id="search-input" placeholder="Search stocks e.g. TCS, Reliance…" oninput="filterStocks(this.value)"/>
        <button onclick="document.getElementById('search-input').value='';filterStocks('')" style="background:none;border:none;color:#3d6080;cursor:pointer;font-size:16px">✕</button>
      </div>
      <div id="stock-list">`;
  for (const s of STOCKS) {
    const inW = watchlist.includes(s.symbol);
    html += stockRowHtml(s, inW);
  }
  html += `</div></div>`;
  c.innerHTML = html;
}

function stockRowHtml(s, inW) {
  return `
    <div class="stock-row" onclick="navigate('search',${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <div class="stock-icon">${s.symbol.slice(0,3)}</div>
      <div style="flex:1;min-width:0">
        <div class="stock-name">${s.name}</div>
        <div class="stock-sector">${s.sector} • ${s.mcap}</div>
      </div>
      <div style="text-align:right;margin-right:4px">
        <div style="font-size:11px;color:#3d6080">${s.symbol}</div>
      </div>
      <button class="star-btn" style="color:${inW?'#ffd166':'#3d6080'}" onclick="event.stopPropagation();toggleWatchlist('${s.symbol}');renderSearch()">${inW?'★':'☆'}</button>
    </div>`;
}

function filterStocks(q) {
  const list = document.getElementById('stock-list');
  if (!list) return;
  const filtered = q ? STOCKS.filter(s =>
    s.name.toLowerCase().includes(q.toLowerCase()) ||
    s.symbol.toLowerCase().includes(q.toLowerCase())
  ) : STOCKS;
  list.innerHTML = filtered.map(s => stockRowHtml(s, watchlist.includes(s.symbol))).join('');
}

// ── STOCK DETAIL ─────────────────────────────────────────────────────────────
async function renderStockDetail() {
  const s = selectedStock;
  const c = document.getElementById('content');
  document.getElementById('page-title').textContent = s.symbol;

  c.innerHTML = `
    <div style="padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1b3354">
      <button class="back-btn" onclick="selectedStock=null;navigate('search')">←</button>
      <div style="flex:1">
        <div style="font-size:16px;font-weight:700">${s.symbol}</div>

function switchTab(tab) {
  ['overview','technicals','forecast'].forEach(t => {
    document.getElementById('tab-'+t)?.classList.toggle('active', t===tab);
    const p = document.getElementById('panel-'+t);
    if (p) p.style.display = t===tab ? 'block' : 'none';
  });
}

function drawIntradayChart(data, bullish) {
  const el = document.getElementById('chart-intraday');
  if (!el || !data.length) return;
  const color = bullish ? '#00c9a7' : '#ef5350';
  new Chart(el, {
    type: 'line',
    data: {
      labels: data.map(d => d.time),
      datasets: [
        {data: data.map(d=>d.upper), borderColor:'transparent', backgroundColor: color+'22', fill:'+1', pointRadius:0},
        {data: data.map(d=>d.predicted), borderColor:color, borderWidth:2, fill:false, pointRadius:0, tension:0.3},
        {data: data.map(d=>d.lower), borderColor:'transparent', backgroundColor:'transparent', fill:false, pointRadius:0},
      ]
    },
    options: chartOptions()
  });
}

function drawForecastChart(id, labels, data, color) {
  const el = document.getElementById(id);
  if (!el || !labels?.length) return;
  new Chart(el, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {data: data.upper, borderColor:'transparent', backgroundColor:color+'22', fill:'+1', pointRadius:0},
        {data: data.predicted, borderColor:color, borderWidth:2, fill:false, pointRadius:0, tension:0.3},
        {data: data.lower, borderColor:'transparent', backgroundColor:'transparent', fill:false, pointRadius:0},
      ]
    },
    options: chartOptions()
  });
}

function chartOptions() {
  return {
    responsive:true, maintainAspectRatio:false, animation:false,
    plugins:{legend:{display:false},tooltip:{
      backgroundColor:'#132840',titleColor:'#7aa8cc',bodyColor:'#f0f8ff',
      callbacks:{label:ctx=>`₹${Number(ctx.parsed.y).toLocaleString('en-IN',{minimumFractionDigits:2})}`}
    }},
    scales:{
      x:{grid:{color:'#1b335430'},ticks:{color:'#3d6080',font:{size:9}},border:{display:false}},
      y:{grid:{color:'#1b335430'},ticks:{color:'#3d6080',font:{size:9},callback:v=>`₹${(v/1000).toFixed(0)}k`},border:{display:false}}
    }
  };
}

                <div style="font-size:9px;color:#3d6080">OI: ${Math.floor(Math.random()*50+10)}K</div>
              </div>
            </div>`;
        }).join('')}
      </div>

      <!-- Forecast Panel -->
      <div id="fo-forecast" style="padding:16px;display:${foTab==='forecast'?'block':'none'}">
        <!-- Direction -->
        <div style="background:${bullish?'#00c9a718':'#ef535018'};border:1px solid ${bullish?'#00c9a755':'#ef535055'};border-radius:12px;padding:14px;margin-bottom:14px;text-align:center">
          <div style="font-size:10px;color:#3d6080;margin-bottom:2px;letter-spacing:1px">${foInstrument.label} FORECAST DIRECTION</div>
          <div style="font-size:26px;font-weight:700;color:${bullish?'#00c9a7':'#ef5350'}">${bullish?'▲ BULLISH':'▼ BEARISH'}</div>
          <div style="font-size:11px;color:#7aa8cc;margin-top:4px">ARIMA + News Sentiment</div>
        </div>

        <!-- 1-Day -->
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="font-size:10px;color:#3d6080;letter-spacing:1px">1-DAY INTRADAY FORECAST</div>
            <div style="font-size:11px;color:${bullish?'#00c9a7':'#ef5350'};font-weight:600">${bullish?'+':''}${expMove} pts expected</div>
          </div>
          <div class="card" style="padding:14px 8px 8px">
            <div class="chart-wrap"><canvas id="fo-chart-intraday" height="150"></canvas></div>
            <div style="display:flex;justify-content:space-between;padding:8px 6px 0;border-top:1px solid #1b335420;margin-top:4px">
              ${[
                ['Open',       `${fmtN(intraday[0]?.predicted||price)}`, '#f0f8ff'],
                ['High',       `${fmtN(Math.max(...intraday.map(x=>x.upper||0)))}`, '#00c9a7'],
                ['Low',        `${fmtN(Math.min(...intraday.map(x=>x.lower||999999)))}`, '#ef5350'],
                ['Close Est.', `${fmtN(intraday[intraday.length-1]?.predicted||price)}`, bullish?'#00c9a7':'#ef5350'],
              ].map(([l,v,col])=>`<div style="text-align:center"><div style="font-size:9px;color:#3d6080">${l}</div><div style="font-size:11px;font-weight:600;color:${col}">${v}</div></div>`).join('')}
            </div>
          </div>
        </div>

        <!-- 7-day -->
        <div style="margin-bottom:16px">
          <div style="font-size:10px;color:#3d6080;margin-bottom:8px;letter-spacing:1px">7-DAY FORECAST</div>
          <div class="card" style="padding:14px 8px 8px"><div class="chart-wrap"><canvas id="fo-chart-7d" height="130"></canvas></div></div>
        </div>

        <!-- 30-day -->
        <div style="margin-bottom:16px">
          <div style="font-size:10px;color:#3d6080;margin-bottom:8px;letter-spacing:1px">30-DAY FORECAST</div>
          <div class="card" style="padding:14px 8px 8px"><div class="chart-wrap"><canvas id="fo-chart-30d" height="130"></canvas></div></div>
        </div>

        <!-- Key levels -->
        <div style="margin-bottom:16px">
          <div style="font-size:10px;color:#3d6080;margin-bottom:8px;letter-spacing:1px">KEY ${foInstrument.label} LEVELS</div>
          ${[
            ['Resistance 2',(levels.resistance2||price*1.04).toFixed(0),'#ef5350'],
            ['Resistance 1',(levels.resistance1||price*1.02).toFixed(0),'#ef5350'],
            ['Current',     price.toFixed(2),                            '#4db6ff'],
            ['Support 1',  (levels.support1||price*0.98).toFixed(0),    '#00c9a7'],
            ['Support 2',  (levels.support2||price*0.96).toFixed(0),    '#00c9a7'],
          ].map(([l,v,col])=>`
            <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #1b335420">
              <span style="font-size:12px;color:${col}">${l}</span>
              <span style="font-size:12px;font-weight:600">${v}</span>
            </div>`).join('')}
        </div>

        <!-- Strategy -->
        <div class="card" style="margin-bottom:14px">
          <div style="font-size:10px;color:#3d6080;margin-bottom:10px;letter-spacing:1px">SUGGESTED OPTIONS STRATEGY</div>
          <div style="background:${bullish?'#00c9a718':'#ef535018'};border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:14px;font-weight:700;color:${bullish?'#00c9a7':'#ef5350'}">${strategy.action||'BUY CALL (CE)'}</div>
            <div style="font-size:11px;color:#7aa8cc">Directional Play</div>
          </div>
          ${[
            ['Strike',    `${atm} ATM`,             '#ffd166'],
            ['Target',    `${strategy.target||atm+200}`,'#00c9a7'],
            ['Stop Loss', `${strategy.stop_loss||atm-200}`,'#ef5350'],
            ['Expiry',    '29 May 2025',             '#7aa8cc'],
            ['Lot Size',  `${foInstrument.lot} units`,'#7aa8cc'],
          ].map(([l,v,col])=>`
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1b335415">
              <span style="font-size:12px;color:#7aa8cc">${l}</span>
              <span style="font-size:12px;font-weight:600;color:${col}">${v}</span>
            </div>`).join('')}
        </div>
      </div>`;

    // Draw charts
    setTimeout(() => {
      if (foTab==='forecast') {
        drawIntradayChart(intraday, bullish);
        // Reuse chart function with fo prefix
        const el7 = document.getElementById('fo-chart-7d');
        const el30 = document.getElementById('fo-chart-30d');
        const elI = document.getElementById('fo-chart-intraday');
        if (elI && intraday.length) {
          new Chart(elI, {type:'line',data:{labels:intraday.map(d=>d.time),datasets:[
            {data:intraday.map(d=>d.upper),borderColor:'transparent',backgroundColor:(bullish?'#00c9a7':'#ef5350')+'22',fill:'+1',pointRadius:0},
            {data:intraday.map(d=>d.predicted),borderColor:bullish?'#00c9a7':'#ef5350',borderWidth:2,fill:false,pointRadius:0,tension:0.3},
            {data:intraday.map(d=>d.lower),borderColor:'transparent',backgroundColor:'transparent',fill:false,pointRadius:0},
          ]},options:chartOptions()});
        }
        if (el7 && day7.dates.length) {
          new Chart(el7,{type:'line',data:{labels:day7.dates,datasets:[
            {data:day7.data.upper,borderColor:'transparent',backgroundColor:'#4db6ff22',fill:'+1',pointRadius:0},
            {data:day7.data.predicted,borderColor:'#4db6ff',borderWidth:2,fill:false,pointRadius:0,tension:0.3},
            {data:day7.data.lower,borderColor:'transparent',backgroundColor:'transparent',fill:false,pointRadius:0},
          ]},options:chartOptions()});
        }
        if (el30 && day30.dates.length) {
          new Chart(el30,{type:'line',data:{labels:day30.dates,datasets:[
            {data:day30.data.upper,borderColor:'transparent',backgroundColor:'#ffd16622',fill:'+1',pointRadius:0},
            {data:day30.data.predicted,borderColor:'#ffd166',borderWidth:2,fill:false,pointRadius:0,tension:0.3},
            {data:day30.data.lower,borderColor:'transparent',backgroundColor:'transparent',fill:false,pointRadius:0},
          ]},options:chartOptions()});
        }
      }
    }, 100);
  }

  window.togglePicker = () => {
    showPicker = !showPicker;
    const dd = document.getElementById('picker-dropdown');
    const arr = document.getElementById('picker-arrow');
    if (dd) dd.style.display = showPicker ? 'block' : 'none';
    if (arr) arr.style.transform = showPicker ? 'rotate(180deg)' : 'none';
  };

  window.foSearchChanged = (q) => {
    foSearchQ = q;
    const list = document.getElementById('picker-list');
    if (!list) return;
    const filtered = getFiltered();
    const fi = filtered.filter(x=>x.type==='index');
    const fs = filtered.filter(x=>x.type==='stock');
    list.innerHTML = `
      ${fi.length?`<div class="picker-section">INDICES (${fi.length})</div>`:''}
      ${fi.map(x=>`<button class="picker-item" onclick="selectFOInstrument('${x.label}')" style="color:${foInstrument.label===x.label?'#4db6ff':'#f0f8ff'}"><div style="text-align:left"><div style="font-size:13px;font-weight:700">${x.label}</div><div style="font-size:10px;color:#3d6080">${x.name}</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:600">${fmtN(x.price)}</div><div style="font-size:9px;color:#3d6080">Lot: ${x.lot}</div></div></button>`).join('')}
      ${fs.length?`<div class="picker-section">STOCK OPTIONS (${fs.length})</div>`:''}
      ${fs.map(x=>`<button class="picker-item" onclick="selectFOInstrument('${x.label}')" style="color:${foInstrument.label===x.label?'#4db6ff':'#f0f8ff'}"><div style="text-align:left"><div style="font-size:13px;font-weight:700">${x.label}</div><div style="font-size:10px;color:#3d6080">${x.name}</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:600">₹${fmtN(x.price)}</div><div style="font-size:9px;color:#3d6080">Lot: ${x.lot}</div></div></button>`).join('')}`;
  };

  window.selectFOInstrument = (label) => {
    foInstrument = FO_INSTRUMENTS.find(x=>x.label===label) || foInstrument;
    showPicker = false;
    foSearchQ = '';
    renderFO();
  };

  window.foSwitchTab = (tab) => {
    foTab = tab;
    ['futures','options','forecast'].forEach(t => {
      const el = document.getElementById('fo-'+t);
      const btn = document.querySelector(`[onclick="foSwitchTab('${t}')"]`);
      if (el) el.style.display = t===tab ? 'block' : 'none';
      if (btn) btn.classList.toggle('active', t===tab);
    });
  };

  c.innerHTML = spinner();
  await buildFO();
}

// ── NEWS ─────────────────────────────────────────────────────────────────────
async function renderNews() {
  const c = document.getElementById('content');
  const tags = ['ALL','MARKET','STOCKS','ECONOMY','GLOBAL','RESULTS','IPO','COMMODITIES'];
  let activeTag = 'ALL';

  c.innerHTML = `
    <div style="padding:16px">
      <div class="news-tags" id="news-tags">
        ${tags.map(t=>`<button class="news-tag ${t==='ALL'?'active':''}" onclick="filterNews('${t}')">${t}</button>`).join('')}
      </div>
      <div id="news-list">${spinner()}</div>
    </div>`;

  const data = await apiFetch('/news?limit=50');
  newsCache = data.news || [];

  window.filterNews = (tag) => {
    activeTag = tag;
    document.querySelectorAll('.news-tag').forEach(b => {
      b.classList.toggle('active', b.textContent===tag);
    });
    const list = document.getElementById('news-list');
    if (!list) return;
    const shown = tag==='ALL' ? newsCache : newsCache.filter(n=>n.tag===tag);
    list.innerHTML = shown.length
      ? shown.map(n => newsCardHtml(n)).join('')
      : `<div style="text-align:center;padding:40px;color:#3d6080">No news for this category</div>`;
  };

  window.filterNews('ALL');
}

function newsCardHtml(n) {
  const sentClass = n.sentiment==='positive'?'badge-pos':n.sentiment==='negative'?'badge-neg':'badge-neu';
  const sentLabel = n.sentiment==='positive'?'● Positive':n.sentiment==='negative'?'● Negative':'● Neutral';
  return `
    <div class="news-card" onclick="window.open('${n.link}','_blank')">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
        <span style="background:#132840;color:#4db6ff;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600">${n.source}</span>
        <span class="badge ${sentClass}">${sentLabel}</span>
        <span style="font-size:10px;color:#3d6080;margin-left:auto">${n.time?n.time.slice(0,16):''}</span>
      </div>
      <div style="font-size:13px;color:#f0f8ff;line-height:1.55">${n.title}</div>
      ${n.tag?`<div style="margin-top:8px"><span style="background:#132840;color:#3d6080;padding:2px 8px;border-radius:4px;font-size:10px">#${n.tag}</span></div>`:''}
    </div>`;
}

// ── WATCHLIST ─────────────────────────────────────────────────────────────────
function renderWatchlist() {
  const c = document.getElementById('content');
  const stocks = STOCKS.filter(s => watchlist.includes(s.symbol));
  if (!stocks.length) {
    c.innerHTML = `
      <div style="text-align:center;padding:70px 20px">
        <div style="font-size:48px;margin-bottom:14px">☆</div>
        <div style="font-size:16px;color:#7aa8cc;margin-bottom:8px">Watchlist is empty</div>
        <div style="font-size:13px;color:#3d6080">Tap ☆ on any stock to add it here</div>
      </div>`;
    return;
  }
  let html = `<div style="padding:16px"><div style="font-size:11px;color:#3d6080;margin-bottom:12px">${stocks.length} stocks tracked</div>`;
  for (const s of stocks) {
    html += `
      <div class="stock-row" onclick="navigate('search',${JSON.stringify(s).replace(/"/g,'&quot;')})">
        <div class="stock-icon">${s.symbol.slice(0,3)}</div>
        <div style="flex:1;min-width:0">
          <div class="stock-name">${s.name}</div>
          <div class="stock-sector">${s.sector}</div>
        </div>
        <div style="text-align:right;margin-right:4px">
          <div style="font-size:11px;color:#3d6080">${s.symbol}</div>
        </div>
        <button class="star-btn" style="color:#ffd166;font-size:20px" onclick="event.stopPropagation();toggleWatchlist('${s.symbol}');renderWatchlist()">★</button>
      </div>`;
  }
  html += `</div>`;
  c.innerHTML = html;
}

navigate('home');
</script>
