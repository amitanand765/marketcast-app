<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#060e1c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MarketCast"/>
<title>MarketCast</title>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="stocks.js"></script>
<script src="fo-stocks.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#060e1c;color:#f0f8ff;font-family:'Segoe UI',system-ui,sans-serif;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:0;height:0}

  /* HEADER */
  .header{background:#060e1c;border-bottom:1px solid #1b3354;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header-title{font-size:18px;font-weight:700}
  .header-right{display:flex;gap:12px;align-items:center}
  .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4db6ff,#00c9a7);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0c1e35;border-top:1px solid #1b3354;display:flex;z-index:100}
  .nav-btn{flex:1;background:none;border:none;padding:10px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:#3d6080}
  .nav-btn.active{color:#4db6ff}
  .nav-btn span:first-child{font-size:19px}
  .nav-btn span:last-child{font-size:9px;font-weight:400}
  .nav-btn.active span:last-child{font-weight:600}
  .nav-dot{width:16px;height:2px;background:#4db6ff;border-radius:2px;margin-top:2px}

  /* CONTENT */
  .content{padding-bottom:68px;min-height:calc(100vh - 60px)}

  /* CARDS */
  .card{background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:14px}
  .card-elevated{background:#132840;border:1px solid #1b3354;border-radius:12px;padding:14px}

  /* MARKET STATUS */
  .market-status{padding:7px 16px;display:flex;align-items:center;gap:8px;font-size:12px}
  .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

  /* INDEX SCROLL */
  .index-scroll{padding:14px 16px 0;overflow-x:auto}
  .index-row{display:flex;gap:10px;min-width:max-content;padding-bottom:4px}
  .index-card{background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:12px 16px;min-width:155px}

  /* STOCK ROW */
  .stock-row{background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
  .stock-icon{width:40px;height:40px;border-radius:10px;background:#132840;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#4db6ff}
  .stock-name{font-size:13px;font-weight:600;color:#f0f8ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stock-sector{font-size:11px;color:#3d6080}

  /* COLORS */
  .green{color:#00c9a7}.red{color:#ef5350}.blue{color:#4db6ff}.yellow{color:#ffd166}.muted{color:#3d6080}.sub{color:#7aa8cc}

  /* BADGES */
  .badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
  .badge-pos{background:#00c9a722;color:#00c9a7}
  .badge-neg{background:#ef535022;color:#ef5350}
  .badge-neu{background:#4db6ff22;color:#4db6ff}

  /* TABS */
  .tabs{display:flex;border-bottom:1px solid #1b3354;padding:0 16px;background:#060e1c;position:sticky;top:57px;z-index:50}
  .tab-btn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:#3d6080;padding:10px 0;font-size:12px;font-weight:400;cursor:pointer;font-family:inherit}
  .tab-btn.active{color:#4db6ff;border-bottom-color:#4db6ff;font-weight:600}

  /* SEARCH */
  .search-box{background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .search-input{background:none;border:none;outline:none;color:#f0f8ff;font-size:14px;flex:1;font-family:inherit}

  /* INFO ROW */
  .info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1b335415}

  /* SPINNER */
  .spinner{width:32px;height:32px;border:3px solid #1b3354;border-top-color:#4db6ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* CHART CONTAINER */
  .chart-wrap{position:relative;width:100%;margin:8px 0}

  /* BACK BTN */
  .back-btn{background:none;border:none;color:#7aa8cc;cursor:pointer;font-size:22px;padding:0;line-height:1}

  /* RECOMMENDATION */
  .rec-card{border-radius:14px;padding:16px;margin-bottom:12px}
  .rec-prices{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
  .rec-price-box{background:#132840;border-radius:10px;padding:10px 8px;text-align:center}

  /* NEWS */
  .news-card{background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:14px;margin-bottom:10px}
  .news-tags{display:flex;gap:8px;flex-wrap:wrap;overflow-x:auto;padding-bottom:12px}
  .news-tag{background:#0c1e35;border:1px solid #1b3354;color:#3d6080;padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit}
  .news-tag.active{background:#4db6ff22;border-color:#4db6ff;color:#4db6ff;font-weight:600}

  /* PICKER */
  .picker-btn{width:100%;background:#0c1e35;border:1px solid #1b3354;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:inherit}
  .picker-dropdown{margin-top:8px;background:#132840;border:1px solid #1b3354;border-radius:12px;overflow:hidden;box-shadow:0 8px 32px #00000066}
  .picker-list{max-height:320px;overflow-y:auto}
  .picker-item{width:100%;background:none;border:none;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:1px solid #1b335415;font-family:inherit}
  .picker-section{padding:6px 14px;font-size:9px;color:#3d6080;letter-spacing:1px;background:#060e1c;border-bottom:1px solid #1b3354}

  /* WATCHLIST STAR */
  .star-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:0 0 0 4px;flex-shrink:0}

  /* GLOBAL */
  .section{padding:14px 16px}
  .section-title{font-size:11px;color:#7aa8cc;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase}
  .flex-row{display:flex;gap:8px;overflow-x:auto}
  .global-card{background:#0c1e35;border:1px solid #1b3354;border-radius:10px;padding:10px 14px;flex-shrink:0}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-title" id="page-title">MarketCast</div>
    <div class="header-right">
      <span style="font-size:18px;color:#3d6080;cursor:pointer">🔔</span>
      <div class="avatar">U</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="navigate('home')" id="nav-home">
      <span>⌂</span><span>Home</span><div class="nav-dot"></div>
    </button>
    <button class="nav-btn" onclick="navigate('search')" id="nav-search">
      <span>⊕</span><span>Search</span>
    </button>
    <button class="nav-btn" onclick="navigate('reco')" id="nav-reco">
      <span>🎯</span><span>Picks</span>
    </button>
    <button class="nav-btn" onclick="navigate('fo')" id="nav-fo">
      <span>◈</span><span>F&amp;O</span>
    </button>
    <button class="nav-btn" onclick="navigate('news')" id="nav-news">
      <span>◉</span><span>News</span>
    </button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const API = 'https://marketcast-backend.onrender.com';

// ── STATE ───────────────────────────────────────────────────────────────────
let currentTab    = 'home';
let selectedStock = null;
let watchlist     = JSON.parse(localStorage.getItem('watchlist') || '[]');
let marketData    = {};
let stockCache    = {};
let newsCache     = [];
let foInstrument  = {label:'NIFTY',name:'Nifty 50',price:22587,atm:22600,lot:50,type:'index'};

// ── HELPERS ─────────────────────────────────────────────────────────────────
const fmt  = (n) => Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = (n) => Number(n).toLocaleString('en-IN');
const chgColor = (v) => v >= 0 ? '#00c9a7' : '#ef5350';
const chgArrow = (v) => v >= 0 ? '▲' : '▼';
const chgHtml  = (v,p,size=12) => `<span style="color:${chgColor(v)};font-size:${size}px;font-weight:500">${chgArrow(v)} ${Math.abs(v).toFixed(2)} (${Math.abs(p).toFixed(2)}%)</span>`;

async function apiFetch(path, retries=1) {
  for (let i = 0; i <= retries; i++) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000); // 30 sec timeout
      const r = await fetch(API + path, {signal: controller.signal});
      clearTimeout(timeout);
      return await r.json();
    } catch(e) {
      if (i === retries) return {error: e.message};
      await new Promise(r => setTimeout(r, 5000));
    }
  }
}

function saveWatchlist() {
  localStorage.setItem('watchlist', JSON.stringify(watchlist));
}

function toggleWatchlist(sym) {
  if (watchlist.includes(sym)) {
    watchlist = watchlist.filter(s => s !== sym);
  } else {
    watchlist.push(sym);
  }
  saveWatchlist();
}

function spinner() {
  return `<div class="spinner"></div>`;
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────
function navigate(tab, stock=null) {
  currentTab = tab;
  selectedStock = stock;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('active');
    b.innerHTML = b.innerHTML.replace('<div class="nav-dot"></div>','');
  });
  const nb = document.getElementById('nav-'+tab);
  if (nb) {
    nb.classList.add('active');
    if (!nb.querySelector('.nav-dot')) nb.insertAdjacentHTML('beforeend','<div class="nav-dot"></div>');
  }
  const titles = {home:'MarketCast',search:'Stocks',fo:'F&O',news:'News',reco:'AI Picks'};
  document.getElementById('page-title').textContent = (tab==='search' && stock) ? '' : titles[tab];
  renderPage();
}

function renderPage() {
  const c = document.getElementById('content');
  c.innerHTML = spinner();
  if (currentTab==='home')      renderHome();
  else if (currentTab==='search' && !selectedStock) renderSearch();
  else if (currentTab==='search' && selectedStock)  renderStockDetail();
  else if (currentTab==='reco')     renderReco();
  else if (currentTab==='fo')       renderFO();
  else if (currentTab==='news')     renderNews();
}

// ── HOME ─────────────────────────────────────────────────────────────────────
async function renderHome() {
  const c = document.getElementById('content');
  const now = new Date();

  c.innerHTML = `<div class="market-status"><span class="status-dot" style="background:#3d6080"></span><span style="color:#3d6080">Checking market...</span></div>` + spinner();

  // Fetch real market status from backend
  const [statusData, market] = await Promise.all([
    apiFetch('/status'),
    apiFetch('/market'),
  ]);

  const open      = statusData.open || false;
  const dotColor  = open ? '#00c9a7' : '#ef5350';
  const statusTxt = open ? 'Market Open' : 'Market Closed';
  const timeStr   = statusData.time_ist || now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});

  let html = `
    <div class="market-status" style="background:${dotColor}12;border-bottom:1px solid ${dotColor}33">
      <span class="status-dot" style="background:${dotColor};box-shadow:0 0 6px ${dotColor}"></span>
      <span style="color:${dotColor};font-weight:600">${statusTxt}</span>
      <span class="muted" style="margin-left:auto;font-size:11px">NSE • ${timeStr}</span>
    </div>`;

  const indices = [
    {name:'NIFTY 50',   key:'NIFTY'},
    {name:'SENSEX',     key:'SENSEX'},
    {name:'BANK NIFTY', key:'BANKNIFTY'},
    {name:'NIFTY IT',   key:'NIFTYIT'},
    {name:'INDIA VIX',  key:'INDIAVIX'},
  ];

  let idxHtml = `<div class="index-scroll"><div class="index-row">`;
  for (const idx of indices) {
    const d = market[idx.key] || {price:0,change:0,pct:0};
    const isVix = idx.key === 'INDIAVIX';
    const vixColor = isVix ? (d.price > 20 ? '#ef5350' : d.price > 15 ? '#ffd166' : '#00c9a7') : null;
    idxHtml += `
      <div class="index-card">
        <div style="font-size:10px;color:#7aa8cc;margin-bottom:4px">${idx.name}</div>
        <div style="font-size:20px;font-weight:700;color:${vixColor||'#f0f8ff'}">${fmtN(d.price)}</div>
        ${isVix
          ? `<div style="font-size:11px;color:${vixColor}">${d.price>20?'⚠️ High Fear':d.price>15?'😐 Caution':'✅ Low Fear'}</div>`
          : chgHtml(d.change,d.pct,11)
        }
      </div>`;
  }
  idxHtml += `</div></div>`;

  // Global markets — categorized slider
  const globalSections = [
    {
      title: '🇺🇸 USA',
      items: [
        {n:'Dow Jones', k:'DOW',    unit:''},
        {n:'Nasdaq',    k:'NASDAQ', unit:''},
        {n:'S&P 500',   k:'SP500',  unit:''},
        {n:'US VIX',    k:'VIX',    unit:'', isVix:true},
        {n:'US 10Y',    k:'US10Y',  unit:'%', isYield:true},
      ]
    },
    {
      title: '🌏 Asia',
      items: [
        {n:'Gift Nifty', k:'GIFTNIFTY', unit:''},
        {n:'Nikkei 225', k:'NIKKEI',    unit:''},
        {n:'Hang Seng',  k:'HANGSENG',  unit:''},
        {n:'Shanghai',   k:'SHANGHAI',  unit:''},
        {n:'KOSPI',      k:'KOSPI',     unit:''},
        {n:'Taiwan',     k:'TAIWAN',    unit:''},
        {n:'STI',        k:'STI',       unit:''},
        {n:'ASX 200',    k:'ASX',       unit:''},
      ]
    },
    {
      title: '🌍 Europe',
      items: [
        {n:'FTSE 100', k:'FTSE',  unit:''},
        {n:'DAX',      k:'DAX',   unit:''},
        {n:'CAC 40',   k:'CAC40', unit:''},
      ]
    },
    {
      title: '🛢️ Commodities & FX',
      items: [
        {n:'Crude Oil',  k:'CRUDE',  unit:'$', isCom:true},
        {n:'Gold',       k:'GOLD',   unit:'$', isCom:true},
        {n:'Silver',     k:'SILVER', unit:'$', isCom:true},
        {n:'USD/INR',    k:'USDINR', unit:'₹', isFx:true},
      ]
    },
  ];

  let globalHtml = `<div class="section"><div class="section-title">🌍 Global Markets</div>`;

  for (const sec of globalSections) {
    globalHtml += `
      <div style="font-size:10px;color:#3d6080;margin-bottom:6px;letter-spacing:1px">${sec.title}</div>
      <div class="flex-row" style="margin-bottom:12px">`;
    for (const g of sec.items) {
      const d = market[g.k] || {price:0,change:0,pct:0};
      const price = d.price ? (g.isCom ? `$${fmt(d.price)}` : g.isFx ? `₹${fmt(d.price)}` : g.isYield ? `${fmt(d.price)}%` : fmtN(d.price)) : '—';
      const col   = d.pct >= 0 ? '#00c9a7' : '#ef5350';
      const vixCol = g.isVix ? (d.price>20?'#ef5350':d.price>15?'#ffd166':'#00c9a7') : null;
      globalHtml += `
        <div class="global-card" style="min-width:100px">
          <div style="font-size:9px;color:#3d6080;margin-bottom:3px">${g.n}</div>
          <div style="font-size:13px;font-weight:600;color:${vixCol||'#f0f8ff'}">${price}</div>
          <div style="font-size:10px;color:${vixCol||col}">
            ${g.isVix ? (d.price>20?'⚠️ Fear':d.price>15?'😐 Caution':'✅ Calm') : `${d.pct>=0?'+':''}${d.pct?.toFixed(2)}%`}
          </div>
        </div>`;
    }
    globalHtml += `</div>`;
  }
  globalHtml += `</div>`;

  // Fetch watchlist stock prices in parallel
  const watchStocks = STOCKS.filter(s => watchlist.includes(s.symbol));

  let stocksHtml = '';
  if (watchStocks.length === 0) {
    stocksHtml = `
      <div class="section">
        <div class="section-title">⭐ MY WATCHLIST</div>
        <div style="background:#0c1e35;border:1px solid #1b3354;border-radius:12px;padding:24px;text-align:center">
          <div style="font-size:32px;margin-bottom:10px">☆</div>
          <div style="font-size:14px;color:#7aa8cc;margin-bottom:6px">No stocks in watchlist</div>
          <div style="font-size:12px;color:#3d6080">Tap ☆ on any stock in Search tab to add it here</div>
        </div>
      </div>`;
  } else {
    const stockPrices = await Promise.allSettled(
      watchStocks.map(s => apiFetch(`/stock/${s.symbol}`))
    );
    stocksHtml = `<div class="section"><div class="section-title">⭐ MY WATCHLIST</div>`;
    watchStocks.forEach((s, i) => {
      const result = stockPrices[i];
      const d      = result.status === 'fulfilled' && !result.value?.error ? result.value : null;
      const price  = d ? `₹${fmt(d.price)}`  : '—';
      const pct    = d ? d.pct : 0;
      const chgTxt = d ? `${pct>=0?'▲':'▼'} ${Math.abs(pct).toFixed(2)}%` : '—';
      const chgCol = pct >= 0 ? '#00c9a7' : '#ef5350';
      stocksHtml += `
        <div class="stock-row" onclick="navigate('search',${JSON.stringify(s).replace(/"/g,'&quot;')})">
          <div class="stock-icon">${s.symbol.slice(0,3)}</div>
          <div style="flex:1;min-width:0">
            <div class="stock-name">${s.name}</div>
            <div class="stock-sector">${s.sector}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:700">${price}</div>
            <div style="font-size:11px;color:${chgCol}">${chgTxt}</div>
          </div>
          <button class="star-btn" style="color:#ffd166;font-size:20px"
            onclick="event.stopPropagation();toggleWatchlist('${s.symbol}');renderHome()">★</button>
        </div>`;
    });
    stocksHtml += `</div>`;
  }

  c.innerHTML = html + idxHtml + globalHtml + stocksHtml;
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
function renderSearch() {
  const c = document.getElementById('content');
  const sectors = ['All','IT','Banking','Energy','Auto','FMCG','Pharma','NBFC','Infra','Utilities','Metals','Defence','Tech','Cement','Healthcare','Chemicals','Real Estate'];

  let html = `
    <div style="padding:16px">
      <div class="search-box">
        <span style="color:#3d6080;font-size:16px">🔍</span>
        <input class="search-input" id="search-input" placeholder="Search 200+ stocks e.g. TCS, Reliance…" oninput="filterStocks(this.value)"/>
        <button onclick="document.getElementById('search-input').value='';filterStocks('')" style="background:none;border:none;color:#3d6080;cursor:pointer;font-size:16px">✕</button>
      </div>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:12px">
        ${sectors.map(s=>`<button onclick="filterBySector('${s}')" id="sector-${s.replace(' ','-')}" class="news-tag ${s==='All'?'active':''}">${s}</button>`).join('')}
      </div>
      <div style="font-size:11px;color:#3d6080;margin-bottom:10px" id="stock-count">${STOCKS.length} stocks</div>
      <div id="stock-list">
        ${STOCKS.map(s=>stockRowHtml(s,watchlist.includes(s.symbol))).join('')}
      </div>
    </div>`;
  c.innerHTML = html;

  window.filterBySector = (sector) => {
    document.querySelectorAll('[id^="sector-"]').forEach(b=>b.classList.remove('active'));
    document.getElementById('sector-'+sector.replace(' ','-'))?.classList.add('active');
    filterStocks(document.getElementById('search-input')?.value||'', sector);
  };
}

function stockRowHtml(s, inW) {
  return `
    <div class="stock-row" onclick="navigate('search',${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <div class="stock-icon">${s.symbol.slice(0,3)}</div>
      <div style="flex:1;min-width:0">
        <div class="stock-name">${s.name}</div>
        <div class="stock-sector">${s.sector} • ${s.mcap}</div>
      </div>
      <div style="text-align:right;margin-right:4px">
        <div style="font-size:11px;color:#3d6080">${s.symbol}</div>
      </div>
      <button class="star-btn" style="color:${inW?'#ffd166':'#3d6080'}" onclick="event.stopPropagation();toggleWatchlist('${s.symbol}');renderSearch()">${inW?'★':'☆'}</button>
    </div>`;
}

function filterStocks(q, sector='All') {
  const list = document.getElementById('stock-list');
  const count = document.getElementById('stock-count');
  if (!list) return;
  let filtered = STOCKS;
  if (q) filtered = filtered.filter(s=>s.name.toLowerCase().includes(q.toLowerCase())||s.symbol.toLowerCase().includes(q.toLowerCase()));
  if (sector && sector!=='All') filtered = filtered.filter(s=>s.sector===sector);
  if (count) count.textContent = `${filtered.length} stocks`;
  list.innerHTML = filtered.length
    ? filtered.map(s=>stockRowHtml(s,watchlist.includes(s.symbol))).join('')
    : `<div style="text-align:center;padding:40px;color:#3d6080">No stocks found</div>`;
}

function switchTab(tab) {
  ['overview','technicals','forecast'].forEach(t => {
    document.getElementById('tab-'+t)?.classList.toggle('active', t===tab);
    const p = document.getElementById('panel-'+t);
    if (p) p.style.display = t===tab ? 'block' : 'none';
  });
}

function drawIntradayChart(data, bullish, actualData=[]) {
  const el = document.getElementById('chart-intraday');
  if (!el || !data.length) return;
  const color = bullish ? '#00c9a7' : '#ef5350';
  const datasets = [
    {
      label: 'Upper Band',
      data: data.map(d => d.upper),
      borderColor: 'transparent',
      backgroundColor: color+'18',
      fill: '+1',
      pointRadius: 0,
      pointHoverRadius: 0,
    },
    {
      label: 'Forecast',
      data: data.map(d => d.predicted),
      borderColor: color,
      borderWidth: 2,
      borderDash: [5,3],
      fill: false,
      pointRadius: 2,
      pointHoverRadius: 6,
      pointBackgroundColor: color,
      tension: 0.3,
    },
    {
      label: 'Lower Band',
      data: data.map(d => d.lower),
      borderColor: 'transparent',
      backgroundColor: 'transparent',
      fill: false,
      pointRadius: 0,
      pointHoverRadius: 0,
    },
  ];

  // Add actual price line if available
  if (actualData.length > 0) {
    // Map actual data to forecast time slots
    const forecastTimes = data.map(d => d.time);
    const actualMapped = forecastTimes.map(t => {
      const match = actualData.find(a => a.time === t);
      return match ? match.price : null;
    });
    datasets.push({
      label: 'Actual',
      data: actualMapped,
      borderColor: '#ffd166',
      borderWidth: 2.5,
      fill: false,
      pointRadius: 3,
      pointHoverRadius: 7,
      pointBackgroundColor: '#ffd166',
      tension: 0.1,
      spanGaps: false,
    });
  }

  new Chart(el, {
    type: 'line',
    data: { labels: data.map(d => d.time), datasets },
    options: chartOptions('₹', actualData.length > 0),
  });
}

function drawForecastChart(id, labels, data, color) {
  const el = document.getElementById(id);
  if (!el || !labels?.length) return;
  new Chart(el, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Upper Band',
          data: data.upper,
          borderColor: 'transparent',
          backgroundColor: color+'22',
          fill: '+1',
          pointRadius: 0,
          pointHoverRadius: 0,
        },
        {
          label: 'Forecast',
          data: data.predicted,
          borderColor: color,
          borderWidth: 2,
          fill: false,
          pointRadius: 3,
          pointHoverRadius: 7,
          pointBackgroundColor: color,
          pointHoverBackgroundColor: '#fff',
          pointHoverBorderColor: color,
          pointHoverBorderWidth: 2,
          tension: 0.3,
        },
        {
          label: 'Lower Band',
          data: data.lower,
          borderColor: 'transparent',
          backgroundColor: 'transparent',
          fill: false,
          pointRadius: 0,
          pointHoverRadius: 0,
        },
      ]
    },
    options: chartOptions(),
  });
}

function chartOptions(yPrefix='₹', showLegend=false) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    interaction: {
      mode: 'index',
      intersect: false,
    },
    plugins: {
      legend: {
        display: showLegend,
        position: 'top',
        labels: {
          color: '#7aa8cc',
          font: {size: 10},
          boxWidth: 20,
          filter: item => item.text !== 'Upper Band' && item.text !== 'Lower Band',
        }
      },
      tooltip: {
        enabled: true,
        mode: 'index',
        intersect: false,
        backgroundColor: '#132840',
        titleColor: '#7aa8cc',
        bodyColor: '#f0f8ff',
        borderColor: '#1b3354',
        borderWidth: 1,
        padding: 10,
        displayColors: true,
        callbacks: {
          label: ctx => {
            if (ctx.parsed.y == null) return null;
            const val = `₹${Number(ctx.parsed.y).toLocaleString('en-IN',{minimumFractionDigits:2})}`;
            return `${ctx.dataset.label}: ${val}`;
          },
          filter: item => item.parsed.y != null && item.parsed.y !== 0 &&
            item.dataset.label !== 'Upper Band' && item.dataset.label !== 'Lower Band',
        }
      }
    },
    scales: {
      x: {
        grid: {color:'#1b335430'},
        ticks: {color:'#3d6080', font:{size:9}},
        border: {display:false}
      },
      y: {
        grid: {color:'#1b335430'},
        ticks: {
          color:'#3d6080',
          font:{size:9},
          callback: v => v >= 1000 ? `₹${(v/1000).toFixed(1)}k` : `₹${v}`
        },
        border: {display:false}
      }
    },
    events: ['mousemove','mouseout','click','touchstart','touchmove','touchend'],
  };
}

async function renderNews() {
  const c = document.getElementById('content');
  const tags = ['ALL','MARKET','STOCKS','ECONOMY','GLOBAL','RESULTS','IPO','COMMODITIES'];
  let activeTag = 'ALL';

  c.innerHTML = `
    <div style="padding:16px">
      <div class="news-tags" id="news-tags">
        ${tags.map(t=>`<button class="news-tag ${t==='ALL'?'active':''}" onclick="filterNews('${t}')">${t}</button>`).join('')}
      </div>
      <div id="news-list">${spinner()}</div>
    </div>`;

  const data = await apiFetch('/news?limit=50');
  newsCache = data.news || [];

  window.filterNews = (tag) => {
    activeTag = tag;
    document.querySelectorAll('.news-tag').forEach(b => {
      b.classList.toggle('active', b.textContent===tag);
    });
    const list = document.getElementById('news-list');
    if (!list) return;
    const shown = tag==='ALL' ? newsCache : newsCache.filter(n=>n.tag===tag);
    list.innerHTML = shown.length
      ? shown.map(n => newsCardHtml(n)).join('')
      : `<div style="text-align:center;padding:40px;color:#3d6080">No news for this category</div>`;
  };

  window.filterNews('ALL');
}

function newsCardHtml(n) {
  const sentClass = n.sentiment==='positive'?'badge-pos':n.sentiment==='negative'?'badge-neg':'badge-neu';
  const sentLabel = n.sentiment==='positive'?'● Positive':n.sentiment==='negative'?'● Negative':'● Neutral';
  return `
    <div class="news-card" onclick="window.open('${n.link}','_blank')">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
        <span style="background:#132840;color:#4db6ff;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600">${n.source}</span>
        <span class="badge ${sentClass}">${sentLabel}</span>
        <span style="font-size:10px;color:#3d6080;margin-left:auto">${n.time?n.time.slice(0,16):''}</span>
      </div>
      <div style="font-size:13px;color:#f0f8ff;line-height:1.55">${n.title}</div>
      ${n.tag?`<div style="margin-top:8px"><span style="background:#132840;color:#3d6080;padding:2px 8px;border-radius:4px;font-size:10px">#${n.tag}</span></div>`:''}
    </div>`;
}

          <div style="font-size:32px;margin-bottom:12px">🎯</div>
          <div style="font-size:13px;color:#4db6ff;margin-bottom:8px">Fetching daily picks...</div>
          <div style="font-size:11px;color:#3d6080">Generated once at 5 AM IST • Same all day</div>
          <div style="margin-top:12px;height:4px;background:#132840;border-radius:2px;overflow:hidden">
            <div style="width:60%;height:100%;background:linear-gradient(90deg,#4db6ff,#00c9a7);border-radius:2px;animation:slide 1s infinite"></div>
          </div>
        </div>
      </div>
      <style>@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}</style>`;

    // Show loading animation
    document.getElementById('reco-content').innerHTML = `
      <div style="padding:24px 16px;text-align:center" id="picks-loading">
        <div style="font-size:40px;margin-bottom:14px">🔍</div>
        <div style="font-size:14px;color:#4db6ff;margin-bottom:8px" id="picks-status">Connecting to server...</div>
        <div style="font-size:11px;color:#3d6080;margin-bottom:16px">Scanning 152 stocks with 13 AI signals</div>
        <div style="height:4px;background:#132840;border-radius:2px;overflow:hidden;margin:0 40px">
          <div style="width:100%;height:100%;background:linear-gradient(90deg,#4db6ff,#00c9a7);border-radius:2px;animation:slide 1.5s infinite"></div>
        </div>
        <div style="font-size:10px;color:#3d6080;margin-top:12px" id="picks-timer">This takes 2-3 minutes on first load</div>
      </div>
      <style>@keyframes slide{0%{margin-left:-100%}100%{margin-left:100%}}</style>`;

    // Trigger background generation first
    await apiFetch('/daily-picks/refresh');

    // Auto-poll every 15 seconds until picks are ready
    let pollCount = 0;
    const maxPolls = 20; // max 5 minutes
    let data = null;

    while (pollCount < maxPolls) {
      await new Promise(r => setTimeout(r, 15000)); // wait 15 seconds
      pollCount++;
      const el = document.getElementById('picks-status');
      const timer = document.getElementById('picks-timer');
      if (el) el.textContent = `Scanning stocks... (${pollCount * 15}s elapsed)`;
      if (timer) timer.textContent = `Checking every 15 seconds — attempt ${pollCount}/${maxPolls}`;

      const result = await apiFetch('/daily-picks');
      if (result && !result.error && result.status !== 'generating' && result.total_scanned > 0) {
        data = result;
        break;
      }
    }

    if (!data || data.total_scanned === 0) {
      document.getElementById('reco-content').innerHTML = `
        <div style="padding:16px;text-align:center">
          <div style="font-size:32px;margin-bottom:12px">⏰</div>
          <div style="font-size:14px;color:#ffd166;margin-bottom:8px">Taking longer than expected</div>
          <div style="font-size:12px;color:#3d6080;margin-bottom:16px">Server is processing 152 stocks</div>
          <button onclick="buildStocksTab()" style="background:#132840;border:1px solid #4db6ff;color:#4db6ff;padding:10px 24px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit">🔄 Try Again</button>
        </div>`;
      return;
    }

    // Fetch results in parallel
    const resultsData = await apiFetch('/pick-results');

    // Build results map only if show_results is true
    const resultsMap = {};
    const showResults = resultsData?.show_results === true;
    if (showResults) {
      (resultsData.results || []).forEach(r => { resultsMap[r.symbol] = r; });
    }
    const summary    = showResults ? (resultsData?.summary || null) : null;
    const afterClose = showResults;

    if (data.error) {
      document.getElementById('reco-content').innerHTML = `
        <div style="padding:16px;text-align:center;color:#ef5350">Error loading picks. Please try again.</div>`;
      return;
    }

    const buys  = data.buy_picks  || [];
    const sells = data.sell_picks || [];

    function recoCard(r, rank) {
      const bull = r.bullish;
      const sig  = r.signals || {};
      const res  = resultsMap[r.symbol];
      return `
        <div style="background:#0c1e35;border:1px solid ${bull?'#00c9a733':'#ef535033'};border-radius:12px;padding:14px;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <div style="width:28px;height:28px;border-radius:50%;background:${bull?'#00c9a722':'#ef535022'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${bull?'#00c9a7':'#ef5350'}">${rank}</div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:700">${r.name}</div>
              <div style="font-size:10px;color:#3d6080">${r.sector} • ${r.symbol}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:16px;font-weight:800;color:${bull?'#00c9a7':'#ef5350'}">${bull?'▲ BUY':'▼ SELL'}</div>
              <div style="font-size:10px;color:#3d6080">${r.confidence}% confidence</div>
            </div>
          </div>

          <!-- Result badge if available -->
          ${res ? `
          <div style="background:${res.result_color}22;border:1px solid ${res.result_color}55;border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:12px;font-weight:700;color:${res.result_color}">${res.result_label}</div>
            <div style="text-align:right;font-size:10px;color:#3d6080">
              <div>High: ₹${fmt(res.actual_high)}</div>
              <div>Low: ₹${fmt(res.actual_low)}</div>
            </div>
          </div>` : ''}

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px">
            ${[
              ['CMP',      `₹${fmt(r.price)}`,       '#f0f8ff'],
              ['Entry',    `₹${fmt(r.entry)}`,       '#4db6ff'],
              ['Target',   `₹${fmt(r.target)}`,      '#00c9a7'],
              ['Stop Loss',`₹${fmt(r.stop_loss)}`,   '#ef5350'],
            ].map(([l,v,col])=>`
              <div style="background:#132840;border-radius:8px;padding:8px 6px;text-align:center">
                <div style="font-size:8px;color:#3d6080;margin-bottom:3px">${l}</div>
                <div style="font-size:11px;font-weight:700;color:${col}">${v}</div>
              </div>`).join('')}
          </div>

          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
            ${[
              ['RSI',    sig.rsi?.toFixed(0),                              sig.rsi<70&&sig.rsi>30],
              ['MACD',   sig.macd_bullish?'▲':'▼',                        sig.macd_bullish],
              ['Vol',    `${sig.volume_ratio?.toFixed(1)}x`,               sig.volume_ratio>1],
              ['News',   sig.news_sentiment>0.1?'+'+sig.news_sentiment?.toFixed(1):sig.news_sentiment?.toFixed(1)||'0', sig.news_sentiment>0],
              ['Global', sig.global_mood,                                  sig.global_avg_pct>=0],
              ['Gift',   `${sig.gift_nifty_pct>0?'+':''}${sig.gift_nifty_pct?.toFixed(1)}%`, sig.gift_nifty_pct>=0],
              ['FII',    sig.fii_sentiment||'—',                           sig.fii_sentiment==='Buying'],
              ['PCR',    sig.options_pcr?.toFixed(2)||'—',                 sig.options_signal==='Bullish'],
            ].map(([l,v,bull])=>`
              <div style="background:#132840;border-radius:6px;padding:3px 7px;display:flex;gap:3px;align-items:center">
                <span style="font-size:8px;color:#3d6080">${l}:</span>
                <span style="font-size:9px;font-weight:600;color:${bull?'#00c9a7':'#ef5350'}">${v}</span>
              </div>`).join('')}
          </div>

          <div style="height:4px;background:#1b3354;border-radius:2px;overflow:hidden">
            <div style="width:${r.confidence}%;height:100%;background:${bull?'#00c9a7':'#ef5350'};border-radius:2px"></div>
          </div>
        </div>`;
    }

    let html = `
      <div style="padding:12px 16px 6px">
        <div style="font-size:11px;color:#3d6080;margin-bottom:4px;letter-spacing:1px">TODAY'S AI STOCK PICKS</div>
        <div style="font-size:12px;color:#7aa8cc">Scanned ${data.total_scanned} stocks • ${data.generated_at}</div>
      </div>

      <!-- Market mood banner -->
      <div style="margin:8px 16px;background:#132840;border:1px solid #1b3354;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;gap:16px">
          <div>
            <div style="font-size:9px;color:#3d6080">MARKET MOOD</div>
            <div style="font-size:12px;font-weight:700;color:${data.market_mood==='Bullish'?'#00c9a7':data.market_mood==='Bearish'?'#ef5350':'#7aa8cc'}">${data.market_mood}</div>
          </div>
          <div>
            <div style="font-size:9px;color:#3d6080">GIFT NIFTY</div>
            <div style="font-size:12px;font-weight:700;color:${data.gift_nifty?.includes('Bull')?'#00c9a7':data.gift_nifty?.includes('Bear')?'#ef5350':'#7aa8cc'}">${data.gift_nifty}</div>
          </div>
          <div>
            <div style="font-size:9px;color:#3d6080">FII</div>
            <div style="font-size:12px;font-weight:700;color:${data.fii_activity==='Buying'?'#00c9a7':data.fii_activity==='Selling'?'#ef5350':'#7aa8cc'}">${data.fii_activity}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:9px;color:#3d6080">NEXT REFRESH</div>
          <div style="font-size:9px;color:#4db6ff">Tomorrow 5 AM</div>
        </div>
      </div>

      <!-- Accuracy Summary Banner -->
      ${summary && (summary.target_hits + summary.sl_hits) > 0 ? `
      <div style="margin:8px 16px;background:#132840;border:1px solid #1b3354;border-radius:10px;padding:12px 14px">
        <div style="font-size:10px;color:#3d6080;margin-bottom:8px;letter-spacing:1px">📊 TODAY'S ACCURACY</div>
        <div style="display:flex;gap:12px;align-items:center">
          <div style="text-align:center">
            <div style="font-size:22px;font-weight:800;color:${summary.accuracy_pct>=60?'#00c9a7':summary.accuracy_pct>=40?'#ffd166':'#ef5350'}">${summary.accuracy_pct}%</div>
            <div style="font-size:9px;color:#3d6080">Accuracy</div>
          </div>
          <div style="flex:1;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px">
            ${[
              ['✅ Target','#00c9a7',summary.target_hits],
              ['❌ SL Hit','#ef5350',summary.sl_hits],
              ['➖ Expired','#ffd166',summary.expired],
              ['⏳ Active','#4db6ff',summary.in_progress],
            ].map(([l,col,v])=>`
              <div style="background:#0c1e35;border-radius:8px;padding:6px;text-align:center">
                <div style="font-size:14px;font-weight:700;color:${col}">${v}</div>
                <div style="font-size:8px;color:#3d6080">${l}</div>
              </div>`).join('')}
          </div>
        </div>
        <div style="margin-top:8px;height:4px;background:#0c1e35;border-radius:2px;overflow:hidden">
          <div style="width:${summary.accuracy_pct}%;height:100%;background:${summary.accuracy_pct>=60?'#00c9a7':summary.accuracy_pct>=40?'#ffd166':'#ef5350'};border-radius:2px"></div>
        </div>
      </div>` : ''}`;

    if (buys.length) {
      html += `<div style="padding:0 16px"><div style="font-size:10px;color:#00c9a7;margin:10px 0 8px;letter-spacing:1px">🟢 TOP BUY PICKS (${buys.length})</div>`;
      buys.forEach((r,i) => { html += recoCard(r, i+1); });
      html += `</div>`;
    }
    if (sells.length) {
      html += `<div style="padding:0 16px"><div style="font-size:10px;color:#ef5350;margin:12px 0 8px;letter-spacing:1px">🔴 TOP SELL/AVOID (${sells.length})</div>`;
      sells.forEach((r,i) => { html += recoCard(r, i+1); });
      html += `</div>`;
    }

    // From cache indicator
    html += `
      <div style="padding:12px 16px;text-align:center">
        <div style="font-size:10px;color:#3d6080">
          ${data.from_cache ? '⚡ Served from cache — instant!' : '🔄 Freshly generated today'}
        </div>
      </div>`;

    document.getElementById('reco-content').innerHTML = html;
  }

  async function buildFOTab(instruments, title, horizon=0) {
    const label = ['1 Day','7 Days','30 Days'][horizon];
    let html = `
      <div style="padding:12px 16px 6px">
        <div style="font-size:11px;color:#3d6080;margin-bottom:4px;letter-spacing:1px">${title} — ${label.toUpperCase()}</div>
        <div style="font-size:12px;color:#7aa8cc">Based on ARIMA forecast + options strategy</div>
      </div>`;

    const results = await Promise.all(
      instruments.map(inst => apiFetch(`/fo/${inst.label}`).then(d => ({...inst, data:d})))
    );

    const valid = results.filter(r => !r.data?.error && r.data?.forecast);

    function foCard(r, rank) {
      const d = r.data;
      const bull = d.bullish;
      const expMove = d.expected_move || 0;
      const strategy = d.strategy || {};
      return `
        <div style="background:#0c1e35;border:1px solid ${bull?'#00c9a733':'#ef535033'};border-radius:12px;padding:14px;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <div style="width:28px;height:28px;border-radius:50%;background:${bull?'#00c9a722':'#ef535022'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${bull?'#00c9a7':'#ef5350'}">${rank}</div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:700">${r.name}</div>
              <div style="font-size:10px;color:#3d6080">${r.label} • Lot: ${r.lot}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:14px;font-weight:800;color:${bull?'#00c9a7':'#ef5350'}">${bull?'▲ BULLISH':'▼ BEARISH'}</div>
              <div style="font-size:10px;color:#3d6080">Exp: ${bull?'+':''}${expMove.toFixed(0)} pts</div>
            </div>
          </div>

          <!-- Options Strategy -->
          <div style="background:${bull?'#00c9a712':'#ef535012'};border-radius:8px;padding:10px 12px;margin-bottom:8px">
            <div style="font-size:10px;color:#3d6080;margin-bottom:4px">SUGGESTED STRATEGY</div>
            <div style="font-size:14px;font-weight:700;color:${bull?'#00c9a7':'#ef5350'}">${strategy.action||'—'}</div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
            ${[
              ['Strike',    strategy.strike||'—',     '#ffd166'],
              ['Target',    strategy.target||'—',     '#00c9a7'],
              ['Stop Loss', strategy.stop_loss||'—',  '#ef5350'],
            ].map(([l,v,col])=>`
              <div style="background:#132840;border-radius:8px;padding:8px 6px;text-align:center">
                <div style="font-size:8px;color:#3d6080;margin-bottom:3px">${l}</div>
                <div style="font-size:12px;font-weight:700;color:${col}">${v}</div>
              </div>`).join('')}
          </div>

          <!-- Key levels -->
          <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
            ${[
              ['R2', d.levels?.resistance2||'—', '#ef535099'],
              ['R1', d.levels?.resistance1||'—', '#ef535066'],
              ['S1', d.levels?.support1||'—',    '#00c9a766'],
              ['S2', d.levels?.support2||'—',    '#00c9a799'],
            ].map(([l,v,col])=>`
              <div style="background:#132840;border-radius:6px;padding:4px 8px;font-size:10px">
                <span style="color:#3d6080">${l}: </span>
                <span style="color:${col};font-weight:600">${v}</span>
              </div>`).join('')}
          </div>
        </div>`;
    }

    const buys  = valid.filter(r => r.data.bullish);
    const sells = valid.filter(r => !r.data.bullish);

    if (buys.length) {
      html += `<div style="padding:0 16px"><div style="font-size:10px;color:#00c9a7;margin-bottom:8px;letter-spacing:1px">🟢 BULLISH OUTLOOK (${buys.length})</div>`;
      buys.forEach((r,i) => { html += foCard(r, i+1); });
      html += `</div>`;
    }
    if (sells.length) {
      html += `<div style="padding:0 16px"><div style="font-size:10px;color:#ef5350;margin:12px 0 8px;letter-spacing:1px">🔴 BEARISH OUTLOOK (${sells.length})</div>`;
      sells.forEach((r,i) => { html += foCard(r, i+1); });
      html += `</div>`;
    }
    return html;
  }

  let activeHorizon = 0;

  async function buildAndRender() {
    c.innerHTML = tabBar() + (recoTab!=='stocks' ? horizBar(activeHorizon) : '') + `<div id="reco-content" style="padding-bottom:16px">${spinner()}</div>`;

    if (recoTab==='stocks')   await buildStocksTab(activeHorizon);
    if (recoTab==='stockfo')  { const html = await buildFOTab(FO_RECO_STOCKS, 'TOP STOCK F&O PICKS', activeHorizon); document.getElementById('reco-content').innerHTML = html; }
    if (recoTab==='niftyfo')  { const html = await buildFOTab(NIFTY_FO, 'NIFTY F&O PICKS', activeHorizon); document.getElementById('reco-content').innerHTML = html; }
  }

  window.recoSwitch = async (tab) => {
    recoTab = tab;
    await buildAndRender();
  };

  window.recoHoriz = async (h) => {
    activeHorizon = h;
    await buildAndRender();
  };

  await buildAndRender();
}

// ── WATCHLIST ─────────────────────────────────────────────────────────────────
function renderWatchlist() {
  const c = document.getElementById('content');
  const stocks = STOCKS.filter(s => watchlist.includes(s.symbol));
  if (!stocks.length) {
    c.innerHTML = `
      <div style="text-align:center;padding:70px 20px">
        <div style="font-size:48px;margin-bottom:14px">☆</div>
        <div style="font-size:16px;color:#7aa8cc;margin-bottom:8px">Watchlist is empty</div>
        <div style="font-size:13px;color:#3d6080">Tap ☆ on any stock to add it here</div>
      </div>`;
    return;
  }
  let html = `<div style="padding:16px"><div style="font-size:11px;color:#3d6080;margin-bottom:12px">${stocks.length} stocks tracked</div>`;
  for (const s of stocks) {
    html += `
      <div class="stock-row" onclick="navigate('search',${JSON.stringify(s).replace(/"/g,'&quot;')})">
        <div class="stock-icon">${s.symbol.slice(0,3)}</div>
        <div style="flex:1;min-width:0">
          <div class="stock-name">${s.name}</div>
          <div class="stock-sector">${s.sector}</div>
        </div>
        <div style="text-align:right;margin-right:4px">
          <div style="font-size:11px;color:#3d6080">${s.symbol}</div>
        </div>
        <button class="star-btn" style="color:#ffd166;font-size:20px" onclick="event.stopPropagation();toggleWatchlist('${s.symbol}');renderWatchlist()">★</button>
      </div>`;
  }
  html += `</div>`;
  c.innerHTML = html;
}

navigate('home');
</script>
